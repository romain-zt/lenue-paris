services:
  postgres:
    # pgvector required for semantic content search (content_chunks table)
    image: pgvector/pgvector:pg16
    container_name: lenueparis-postgres
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: lenueparis
      POSTGRES_USER: lenueparis
      POSTGRES_PASSWORD: lenueparis
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lenueparis -d lenueparis"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: lenueparis-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: lenueparis
      MINIO_ROOT_PASSWORD: lenueparis123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  # One-shot: create the media bucket on startup, then exit.
  createbuckets:
    image: minio/mc:latest
    container_name: lenueparis-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: lenueparis
      MINIO_ROOT_PASSWORD: lenueparis123
      S3_BUCKET: media
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing local/$$S3_BUCKET;
      mc anonymous set download local/$$S3_BUCKET;
      exit 0;
      "

volumes:
  postgres_data:
  minio_data: