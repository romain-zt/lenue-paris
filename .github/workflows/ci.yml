name: CI

# Quality gate. Graceful on a fresh clone: if there is no pnpm monorepo at the repo
# root yet (governance-only state), the job succeeds as a no-op so the first PR is green.
# `turbo run <task>` is itself graceful — packages without a given task are simply skipped.

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      CI: "true"
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      TEST_DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      PAYLOAD_SECRET: ci-placeholder-secret-for-migrations

    steps:
      - uses: actions/checkout@v4

      - name: Detect pnpm monorepo
        id: detect
        run: |
          if [ -f package.json ] && [ -f pnpm-workspace.yaml ]; then
            echo "has_app=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_app=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  No pnpm monorepo at root yet — governance-only repo. Quality passes as no-op."
          fi

      - uses: pnpm/action-setup@v4
        if: steps.detect.outputs.has_app == 'true'

      - uses: actions/setup-node@v4
        if: steps.detect.outputs.has_app == 'true'
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        if: steps.detect.outputs.has_app == 'true'
        run: pnpm install --no-frozen-lockfile

      - name: Migrate DB
        if: steps.detect.outputs.has_app == 'true'
        run: |
          pnpm --filter cms run migrate
          pnpm --filter web run migrate

      - name: Typecheck
        if: steps.detect.outputs.has_app == 'true'
        run: pnpm run typecheck

      - name: Lint
        if: steps.detect.outputs.has_app == 'true'
        run: pnpm run lint

      - name: Test
        if: steps.detect.outputs.has_app == 'true'
        run: pnpm run test

      - name: Build
        if: steps.detect.outputs.has_app == 'true'
        run: pnpm run build

      - name: Install framework script deps
        if: steps.detect.outputs.has_app == 'false' || steps.detect.outputs.has_app == 'true'
        run: npm install --prefix .github/scripts/core

      - name: Validate framework paths
        run: npx --prefix .github/scripts/core tsx .github/scripts/core/validate-framework-paths.ts
