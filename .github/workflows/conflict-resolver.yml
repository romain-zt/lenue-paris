name: Conflict Resolver — Smart merge via Cursor Agent

# When main advances, every open non-draft PR that becomes conflicting gets a Cursor
# agent that merges origin/main into the branch and resolves conflicts before pushing.
#
# Triggers:
#   - push to main: primary signal that base advanced — fires immediately.
#   - workflow_run on CI/E2E completion against main: catches the case where
#     the push handler ran while GitHub was still computing mergeability.
#     A second sweep ~1 min later, by which time the calc is usually done.
#   - 15-min cron: safety net for missed events. (GitHub Actions cron is
#     unreliable in practice — recent runs have skipped multi-hour windows
#     — so we don't rely on it as the primary path.)
#   - workflow_dispatch: manual sweep.

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["CI", "E2E"]
    types: [completed]
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you manually triggering?"
        required: false
        default: "manual conflict resolution sweep"

concurrency:
  group: conflict-resolver-${{ github.repository }}
  cancel-in-progress: false

jobs:
  resolve-conflicts:
    # workflow_run only matters when the upstream run was on main — that's when
    # other PRs' mergeability gets recomputed. Anything else is noise.
    if: >-
      github.event_name != 'workflow_run'
      || (github.event.workflow_run.head_branch == 'main'
          && github.event.workflow_run.event == 'push')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
      # Model tier is selected per-PR in .github/scripts/cursor-models.config.ts
      # (Manager by default, Vision when sensitive paths are touched). Override
      # per-tier ids via repo variables when bumping model versions.
      CURSOR_MODEL_VISION_ID: ${{ vars.CURSOR_MODEL_VISION_ID }}
      CURSOR_MODEL_MANAGER_ID: ${{ vars.CURSOR_MODEL_MANAGER_ID }}
      CURSOR_MODEL_EXECUTOR_ID: ${{ vars.CURSOR_MODEL_EXECUTOR_ID }}
      REPO: ${{ github.repository }}
      BASE_BRANCH: ${{ vars.ORCHESTRATOR_TRACKING_BASE || 'main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - name: Install script deps
        run: npm install --prefix .github/scripts

      - name: Configure git identity
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Run Cursor conflict resolver
        run: npx tsx .github/scripts/conflict-resolver.ts
