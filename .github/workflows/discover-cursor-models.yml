name: Discover Cursor Models

# One-shot utility: lists every model id + variant available to this account's
# CURSOR_API_KEY via @cursor/sdk. Use the output to set the
# vars.CURSOR_MODEL_<TIER>_ID repo variables (vision / manager / executor).
#
# Run via Actions → Discover Cursor Models → Run workflow.
# Output: GitHub Step Summary (Markdown table) + cursor-models-discovered.json artifact.

on:
  workflow_dispatch: {}

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: npm install --prefix .github/scripts

      - name: List Cursor models
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: npx --prefix .github/scripts tsx .github/scripts/discover-cursor-models.ts

      - name: Upload discovery JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cursor-models-discovered
          path: cursor-models-discovered.json
          if-no-files-found: warn
