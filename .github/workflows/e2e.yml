name: E2E

# Optional end-to-end gate. Auto-skips (green) until a Playwright suite exists, so a
# fresh project is not blocked. Once you add Playwright, this `playwright` check becomes
# meaningful — add it to REQUIRED_CHECKS (repo variable) to make it a hard merge gate.

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: e2e
          POSTGRES_PASSWORD: e2e
          POSTGRES_DB: e2e
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U e2e -d e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      CI: "true"
      E2E_MODE: "true"
      DATABASE_URL: postgresql://e2e:e2e@localhost:5433/e2e
      TEST_DATABASE_URL: postgresql://e2e:e2e@localhost:5433/e2e
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
      PAYLOAD_SECRET: ci-placeholder-secret-for-e2e

    steps:
      - uses: actions/checkout@v4

      - name: Detect Playwright suite
        id: detect
        run: |
          if ls playwright.config.* >/dev/null 2>&1 \
            || find apps packages -maxdepth 3 -name 'playwright.config.*' 2>/dev/null | grep -q . \
            || (command -v jq >/dev/null && [ -f package.json ] && jq -e '.scripts["test:e2e"]' package.json >/dev/null 2>&1); then
            echo "has_e2e=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_e2e=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  No Playwright suite found yet — E2E passes as no-op until you add one."
          fi

      - uses: pnpm/action-setup@v4
        if: steps.detect.outputs.has_e2e == 'true'

      - uses: actions/setup-node@v4
        if: steps.detect.outputs.has_e2e == 'true'
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        if: steps.detect.outputs.has_e2e == 'true'
        run: pnpm install --no-frozen-lockfile

      - name: Migrate DB
        if: steps.detect.outputs.has_e2e == 'true'
        run: |
          pnpm --filter cms run migrate
          pnpm --filter web run migrate

      - name: Run E2E tests
        if: steps.detect.outputs.has_e2e == 'true'
        run: pnpm run test:e2e

      - name: Upload Playwright report
        if: always() && steps.detect.outputs.has_e2e == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            apps/*/playwright-report/
          retention-days: 7
          if-no-files-found: ignore
