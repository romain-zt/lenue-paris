name: PR Automation

# On every PR to main: wait for required checks, then a Cursor cloud agent reviews
# and (if clean) squash-merges. Required checks default to `quality`; override with the
# REQUIRED_CHECKS repo variable (e.g. "quality,playwright") once you add more gates.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: [main]

jobs:
  required-checks:
    name: gate-required-checks
    runs-on: ubuntu-latest
    timeout-minutes: 35
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: read
      checks: read
    steps:
      - uses: actions/checkout@v4
      - name: Wait for required checks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
          REQUIRED_CHECKS: ${{ vars.REQUIRED_CHECKS || 'quality' }}
        run: bash .github/scripts/core/wait-for-required-pr-checks.sh

  cursor-review-and-merge:
    needs: required-checks
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: >-
      needs.required-checks.result == 'success'
      && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
      pull-requests: write
      checks: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: npm install --prefix .github/scripts/core

      - name: Run Cursor PR automation
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          # Model tier defaults are in .github/scripts/core/cursor-models.config.ts (Manager tier).
          # Override per-tier model id with repo variables when bumping versions.
          CURSOR_MODEL_VISION_ID: ${{ vars.CURSOR_MODEL_VISION_ID }}
          CURSOR_MODEL_MANAGER_ID: ${{ vars.CURSOR_MODEL_MANAGER_ID }}
          CURSOR_MODEL_EXECUTOR_ID: ${{ vars.CURSOR_MODEL_EXECUTOR_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
          REQUIRED_CHECKS: ${{ vars.REQUIRED_CHECKS || 'quality' }}
        run: npx --prefix .github/scripts/core tsx .github/scripts/core/pr-automation.ts
