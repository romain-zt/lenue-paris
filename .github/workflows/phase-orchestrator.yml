name: Phase Orchestrator

# Advances the pipeline after merges, on a 30-min schedule (safety net for missed
# webhooks), or via manual dispatch. Coordinator mode auto-detects ready steps and
# fans out one worker per step; worker mode (step_id set) executes a single step.
# Job timeout is bounded so a run can never hang past ~50 min.

on:
  pull_request:
    types: [closed]
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you manually triggering?"
        required: false
        default: "manual kickoff"
      step_id:
        description: "Specific step to execute — leave blank for coordinator mode (auto-detect all ready steps)"
        required: false
        default: ""

concurrency:
  # Workers get a step-scoped group (parallel); the coordinator gets its own group.
  group: ${{ github.event.inputs.step_id && format('phase-orchestrator-worker-{0}-{1}', github.event.inputs.step_id, github.repository) || format('phase-orchestrator-coordinator-{0}', github.repository) }}
  cancel-in-progress: false

jobs:
  orchestrate:
    if: >-
      github.event_name == 'workflow_dispatch'
      || github.event_name == 'schedule'
      || (
        github.event_name == 'pull_request'
        && github.event.pull_request.merged == true
        && (
          github.event.pull_request.base.ref == 'main'
          || startsWith(github.event.pull_request.base.ref, 'feature/')
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 50
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: npm install --prefix .github/scripts/core

      - name: Run phase orchestrator
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          # Model tier defaults are in .github/scripts/core/cursor-models.config.ts
          # (Manager for the worker; sub-delegates code-typing to the Executor subagent).
          # Override the canonical model id per tier with repo variables when bumping.
          CURSOR_MODEL_VISION_ID: ${{ vars.CURSOR_MODEL_VISION_ID }}
          CURSOR_MODEL_MANAGER_ID: ${{ vars.CURSOR_MODEL_MANAGER_ID }}
          CURSOR_MODEL_EXECUTOR_ID: ${{ vars.CURSOR_MODEL_EXECUTOR_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          MERGED_PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          MERGED_HEAD_BRANCH: ${{ github.event.pull_request.head.ref || '' }}
          MERGED_PR_TITLE: ${{ github.event.pull_request.title || '' }}
          ORCHESTRATOR_ENABLED: ${{ vars.ORCHESTRATOR_ENABLED || 'true' }}
          ORCHESTRATOR_TRACKING_BASE: ${{ vars.ORCHESTRATOR_TRACKING_BASE || 'main' }}
          MAX_REMEDIATION_RUNS: ${{ vars.MAX_REMEDIATION_RUNS || '5' }}
          STEP_ID: ${{ github.event.inputs.step_id || '' }}
        run: npx --prefix .github/scripts/core tsx .github/scripts/core/phase-orchestrator.ts
