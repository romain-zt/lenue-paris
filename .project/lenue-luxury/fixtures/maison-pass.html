<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Boutique éditoriale — robes, sacs et foulards." />
  <title>Lénue Paris</title>
  <style>
    :root {
      --color-accent: hsl(30 18% 42%);
      --color-bg: hsl(40 20% 96%);
      --color-text: hsl(30 10% 18%);
      --font-display: "Cormorant Garamond", Georgia, serif;
      --font-body: "Inter", system-ui, sans-serif;
      --space-hero: clamp(3rem, 12vw, 8rem);
      --gutter-mobile: 24px;
      --gutter-desktop: 32px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      color: var(--color-text);
      background: var(--color-bg);
      line-height: 1.6;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem var(--gutter-mobile);
    }
    @media (min-width: 768px) {
      header { padding: 1.5rem var(--gutter-desktop); }
    }
    [data-maison='wordmark'] {
      font-family: var(--font-display);
      font-size: 1.25rem;
      letter-spacing: 0.08em;
      font-weight: 400;
    }
    nav a {
      margin-left: 1.5rem;
      text-decoration: none;
      color: inherit;
      font-size: 0.875rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    [data-maison='hero'] {
      width: 100vw;
      margin-left: calc(50% - 50vw);
      min-height: 72vh;
      padding: var(--space-hero) var(--gutter-mobile);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      background: var(--color-bg);
      position: relative;
    }
    @media (min-width: 768px) {
      [data-maison='hero'] { padding: var(--space-hero) var(--gutter-desktop); }
    }
    [data-maison='hero-image'] {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.92;
    }
    .hero-copy {
      position: relative;
      z-index: 1;
      max-width: 28rem;
      padding-bottom: 2rem;
    }
    .hero-copy h1 {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: clamp(2rem, 5vw, 3.25rem);
      margin-bottom: 1rem;
    }
    .hero-copy p {
      font-size: 1rem;
      max-width: 22rem;
      margin-bottom: 1.5rem;
    }
    [data-maison='cta-whatsapp'] {
      display: inline-block;
      min-height: 44px;
      min-width: 44px;
      padding: 0.75rem 1.25rem;
      border: 1px solid currentColor;
      background: transparent;
      font-size: 0.875rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
    }
    [data-maison='catalogue-grid'] {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--gutter-mobile);
      padding: 4rem var(--gutter-mobile);
      max-width: 1200px;
      margin: 0 auto;
    }
    @media (min-width: 768px) {
      [data-maison='catalogue-grid'] {
        grid-template-columns: repeat(3, 1fr);
        gap: var(--gutter-desktop);
        padding: 5rem var(--gutter-desktop);
      }
    }
    .tile img { width: 100%; display: block; }
    footer {
      padding: 2rem var(--gutter-mobile);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8125rem;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <header data-maison="header">
    <span data-maison="wordmark">Lénue Paris</span>
    <nav data-maison="nav">
      <a href="#">Catalogue</a>
      <a href="#">La maison</a>
    </nav>
  </header>

  <section data-maison="hero">
    <img
      data-maison="hero-image"
      src="/media/editorial/hero-soft-natural.jpg"
      alt="Robe en lin dans une lumière douce — collection Lénue Paris"
    />
    <div class="hero-copy">
      <h1>Une garde-robe éditoriale</h1>
      <p>Robes, sacs et foulards choisis avec soin. Commandez en toute simplicité.</p>
      <button data-maison="cta-whatsapp" type="button">Commander sur WhatsApp</button>
    </div>
  </section>

  <section data-maison="catalogue-grid">
    <article class="tile">
      <img src="/media/products/dress-editorial-01.jpg" alt="Robe longue en soie naturelle" />
    </article>
    <article class="tile">
      <img src="/media/products/bag-packshot-01.jpg" alt="Sac en cuir souple" />
    </article>
    <article class="tile">
      <img src="/media/products/scarf-editorial-01.jpg" alt="Foulard en soie imprimé" />
    </article>
  </section>

  <footer data-maison="footer">
    <span>Lénue Paris</span>
    <a data-maison="footer-instagram" href="https://instagram.com/placeholder">Instagram</a>
  </footer>

  <script type="application/json" id="i18n-fixture">
  {
    "nav.catalogue": { "fr": "Catalogue", "en": "Catalogue", "ru": "Каталог" },
    "nav.editorial": { "fr": "La maison", "en": "The house", "ru": "О доме" },
    "footer.instagram": { "fr": "Instagram", "en": "Instagram", "ru": "Instagram" },
    "cta.whatsapp": { "fr": "Commander sur WhatsApp", "en": "Continue in WhatsApp", "ru": "Заказать в WhatsApp" },
    "meta.title": { "fr": "Lénue Paris", "en": "Lénue Paris", "ru": "Lénue Paris" },
    "meta.description": {
      "fr": "Boutique éditoriale — robes, sacs et foulards.",
      "en": "Editorial boutique — dresses, bags, and scarfs.",
      "ru": "Редакционный бутик — платья, сумки и платки."
    }
  }
  </script>
</body>
</html>
