<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ignition kit — Cursor + GitHub CI</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.5;
      color: #111;
      background: #f4f4f5;
      margin: 0;
      padding: 1rem;
      min-height: 100vh;
    }
    main {
      max-width: 22rem;
      margin: 0 auto;
      padding: 1.5rem 0 2rem;
    }
    h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
    p { margin: 0.5rem 0; font-size: 0.95rem; }
    .steps { font-size: 0.9rem; color: #333; margin: 1rem 0; padding-left: 1.1rem; }
    .steps li { margin: 0.35rem 0; }
    a.btn {
      display: block;
      text-align: center;
      margin: 1.25rem 0;
      padding: 0.85rem 1rem;
      min-height: 44px;
      background: #111;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
    }
    a.btn:hover, a.btn:focus { background: #333; }
    .muted { color: #666; font-size: 0.8rem; }
    code { font-size: 0.85em; background: #e8e8ea; padding: 0.1em 0.35em; border-radius: 4px; }
  </style>
</head>
<body>
  <main>
    <h1>Ignition kit</h1>
    <p>One wired slice · living PRD · motor runs when <code>FIREABLE=1</code>.</p>
    <ol class="steps">
      <li>Unzip into repo root (needs this framework’s <code>.cursor/</code> + workflows).</li>
      <li>Add <code>CURSOR_API_KEY</code> secret.</li>
      <li>Merge to <code>main</code>.</li>
    </ol>
    <a class="btn" href="ignition-kit.zip" download="ignition-kit.zip">Download ignition-kit.zip</a>
    <p class="muted">Local: <code>open docs/ship-first-pack/index.html</code></p>
  </main>
</body>
</html>
